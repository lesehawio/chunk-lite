<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Chunk Lite | منوی جزوه‌ها</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#8A64FF;
  --brand-2:#B27CFF;
  --bg:#f5f3ff;
  --card:#ffffff;
  --muted:#6C5F8A;
  --maxw:900px;
  --shadow: 0 10px 30px rgba(0,0,0,0.06);
  --text: #1e1b2e;
}
html.dark {
  --bg: #0e0c1a;
  --card: #15132b;
  --text: #eceaff;
  --muted: #b5abdd;
  --shadow: 0 10px 30px rgba(0,0,0,0.4);
}
*{ margin:0; padding:0; box-sizing:border-box; }
body{
  font-family: 'Vazirmatn', system-ui;
  background: var(--bg);
  color: var(--text);
  transition: all 0.25s;
  padding: 24px 16px;
}
.container{ max-width: var(--maxw); margin: 0 auto; }

/* header */
.header{
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 16px;
  margin-bottom: 28px;
  padding-bottom: 16px;
  border-bottom: 1px solid rgba(138,100,255,0.2);
}
.logo-area{ display: flex; align-items: center; gap: 12px; }
.logo-area img{ height: 48px; width: auto; }
.logo-area h1{ font-size: 1.5rem; background: linear-gradient(135deg, #4A3A7A, var(--brand)); background-clip: text; -webkit-background-clip: text; color: transparent; }
.theme-btn{
  background: var(--card);
  border: 1px solid rgba(138,100,255,0.3);
  padding: 8px 16px;
  border-radius: 30px;
  cursor: pointer;
  font-size: 0.8rem;
  color: var(--text);
}

/* جستجو */
.search-box{ margin-bottom: 20px; }
.search-box input{
  width: 100%;
  padding: 12px 18px;
  border-radius: 40px;
  border: 1px solid rgba(138,100,255,0.2);
  background: var(--card);
  color: var(--text);
  font-size: 0.9rem;
  font-family: inherit;
  outline: none;
}

/* دکمه‌ها */
.controls{
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}
.btn{
  background: var(--card);
  border: 1px solid rgba(138,100,255,0.3);
  padding: 8px 18px;
  border-radius: 30px;
  cursor: pointer;
  font-size: 0.8rem;
  color: var(--text);
  transition: 0.2s;
}
.btn:hover{ background: var(--brand); color: white; border-color: var(--brand); }

/* لیست جزوه‌ها */
.quiz-list{
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.quiz-card{
  background: var(--card);
  border-radius: 20px;
  padding: 16px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
  border: 1px solid rgba(138,100,255,0.1);
  transition: all 0.2s;
}
.quiz-card:hover{
  transform: translateY(-3px);
  border-color: var(--brand);
  box-shadow: var(--shadow);
}
.quiz-left{ display: flex; align-items: center; gap: 14px; }
.badge{
  width: 55px;
  height: 55px;
  border-radius: 16px;
  background: linear-gradient(135deg, var(--brand), var(--brand-2));
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 1.1rem;
}
.quiz-info h3{ font-size: 1rem; font-weight: 700; }
.quiz-info p{ font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
.start{
  background: linear-gradient(135deg, var(--brand), var(--brand-2));
  color: white;
  border: none;
  padding: 8px 20px;
  border-radius: 30px;
  cursor: pointer;
  font-weight: 600;
  text-decoration: none;
  font-size: 0.8rem;
  display: inline-block;
}
.empty{ text-align: center; padding: 40px; color: var(--muted); }
.to-top{
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 45px;
  height: 45px;
  border-radius: 50%;
  background: var(--brand);
  color: white;
  border: none;
  cursor: pointer;
  opacity: 0;
  transition: 0.2s;
}
.to-top.show{ opacity: 1; }

@media (max-width: 550px){
  .quiz-card{ flex-direction: column; align-items: stretch; }
  .quiz-left{ justify-content: space-between; }
  .start{ text-align: center; }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo-area">
      <img src="https://uploadkon.ir/uploads/5a9b23_26file-00000000ec0c71f48c35ec17ac138f5c.png" alt="Chunk Lite">
      <h1>چانک لایت</h1>
    </div>
    <button id="themeToggle" class="theme-btn">🌗 تغییر تم</button>
  </div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="جستجوی جزوه (شماره یا عنوان)...">
  </div>

  <div class="controls">
    <button id="resetBtn" class="btn">🗑️ نمایش همه</button>
    <button id="shuffleBtn" class="btn">🎲 تصادفی</button>
    <button id="sortBtn" class="btn">📅 مرتب‌سازی</button>
  </div>

  <div id="quizList" class="quiz-list"></div>
  <div id="emptyMsg" class="empty" style="display: none;">هیچ جزوه‌ای یافت نشد</div>
</div>

<button id="toTopBtn" class="to-top">▲</button>

<script>
// ======================= جزوه‌ها (مطابق فایل‌های داخل پوشه شما) =======================
const notebooks = [
  { id: 1, title: "جزوه ۱", desc: "تمرین چانک‌های Fast Reactions", href: "01.html" },
  { id: 2, title: "جزوه ۲", desc: "تمرین چانک‌های Natural Fillers", href: "02.html" },
  { id: 3, title: "جزوه ۳", desc: "تمرین چانک‌های Softening", href: "03.html" },
  { id: 4, title: "جزوه ۴", desc: "تمرین چانک‌های Ending", href: "04.html" },
  { id: 5, title: "جزوه ۵", desc: "تمرین چانک‌های Strong Emotions", href: "05.html" },
  { id: 6, title: "جزوه ۶", desc: "تمرین چانک‌های Asking Questions", href: "06.html" },
  { id: 7, title: "جزوه ۷", desc: "تمرین چانک‌های Shadowing", href: "07.html" },
  { id: 8, title: "جزوه ۸", desc: "تمرین چانک‌های Slang", href: "08.html" },
  { id: 9, title: "جزوه ۹", desc: "تمرین چانک‌های Grammar", href: "09.html" },
  { id: 10, title: "جزوه ۱۰", desc: "تمرین چانک‌های Final Review", href: "10.html" }
];

let currentList = [...notebooks];
let sortAsc = true;

const listEl = document.getElementById('quizList');
const emptyEl = document.getElementById('emptyMsg');
const searchInput = document.getElementById('searchInput');
const resetBtn = document.getElementById('resetBtn');
const shuffleBtn = document.getElementById('shuffleBtn');
const sortBtn = document.getElementById('sortBtn');
const toTopBtn = document.getElementById('toTopBtn');

function escapeHtml(str) {
  return String(str).replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

function render() {
  if (!currentList.length) {
    listEl.innerHTML = '';
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';
  listEl.innerHTML = currentList.map(item => `
    <div class="quiz-card">
      <div class="quiz-left">
        <div class="badge">${item.id}</div>
        <div class="quiz-info">
          <h3>${escapeHtml(item.title)}</h3>
          <p>${escapeHtml(item.desc)}</p>
        </div>
      </div>
      <a class="start" href="${item.href}">باز کردن جزوه</a>
    </div>
  `).join('');
}

function filterList() {
  const term = searchInput.value.trim().toLowerCase();
  if (!term) {
    currentList = [...notebooks];
  } else {
    currentList = notebooks.filter(item => 
      item.id.toString() === term || 
      item.title.toLowerCase().includes(term)
    );
  }
  render();
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

searchInput.addEventListener('input', filterList);
resetBtn.addEventListener('click', () => {
  searchInput.value = '';
  currentList = [...notebooks];
  render();
});
shuffleBtn.addEventListener('click', () => {
  currentList = shuffleArray(currentList);
  render();
});
sortBtn.addEventListener('click', () => {
  sortAsc = !sortAsc;
  currentList.sort((a, b) => sortAsc ? a.id - b.id : b.id - a.id);
  render();
});

// اسکرول به بالا
window.addEventListener('scroll', () => {
  if (window.scrollY > 250) toTopBtn.classList.add('show');
  else toTopBtn.classList.remove('show');
});
toTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

// تم تاریک/روشن
function initTheme() {
  const saved = localStorage.getItem('chunk_theme');
  if (saved === 'dark') document.documentElement.classList.add('dark');
  else if (saved === 'light') document.documentElement.classList.remove('dark');
  else if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.classList.add('dark');
}
function toggleTheme() {
  if (document.documentElement.classList.contains('dark')) {
    document.documentElement.classList.remove('dark');
    localStorage.setItem('chunk_theme', 'light');
  } else {
    document.documentElement.classList.add('dark');
    localStorage.setItem('chunk_theme', 'dark');
  }
}
document.getElementById('themeToggle').addEventListener('click', toggleTheme);
initTheme();

render();
</script>
</body>
</html>
